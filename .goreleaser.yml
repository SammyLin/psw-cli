# GoReleaser configuration for psw-cli
# https://goreleaser.com

version: 2

project_name: psw-cli

builds:
  - id: psw-cli
    main: .
    binary: psw-cli
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath

  - id: psw-cli-verify
    main: ./cmd/verify-server
    binary: psw-cli-verify
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath

archives:
  - id: psw-cli-archive
    ids:
      - psw-cli
      - psw-cli-verify
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

homebrew_casks:
  - name: psw-cli
    ids:
      - psw-cli-archive
    repository:
      owner: SammyLin
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    description: "Secure CLI password manager with age encryption and macOS Keychain"
    homepage: "https://github.com/SammyLin/psw-cli"
    binaries:
      - psw-cli
      - psw-cli-verify

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: SammyLin
    name: psw-cli
  draft: false
